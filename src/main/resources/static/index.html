<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Student Management</h1>
            <p class="subtitle">Administrative Dashboard</p>
        </header>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Total Students</span>
                    <span id="totalStudents" class="stat-number">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span class="stat-label">Average Age</span>
                    <span id="avgAge" class="stat-number">0</span>
                </div>
            </div>
        </div>

        <!-- Form -->
        <div class="card form-card">
            <div class="card-header">
                <h2 id="formTitle">Add New Student</h2>
            </div>
            <div class="card-body">
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" placeholder="Enter full name" required>
                            <span class="error-message" id="nameError"></span>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="name@example.com" required>
                            <span class="error-message" id="emailError"></span>
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="Enter age" required min="1" max="150">
                            <span class="error-message" id="ageError"></span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Save Student</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn"
                            style="display: none;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card table-card">
            <div class="card-header">
                <h2>Student Records</h2>
                <button class="btn btn-outline" id="refreshBtn">Refresh</button>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Age</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <p>No student records found</p>
                    <p class="empty-hint">Add a student using the form above</p>
                </div>
                <div id="loadingState" class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading records...</p>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast">
            <span class="toast-message"></span>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Spring Boot REST API Demo</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
